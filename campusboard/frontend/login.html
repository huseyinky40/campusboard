<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş — CampusBoard</title>
  <link rel="icon" type="image/svg+xml" href="assets/campusboard_app_icon.svg" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-body">

  <!-- Sol panel -->
  <div class="auth-panel-left">
    <div class="auth-brand">
      <img src="assets/campusboard_app_icon.svg" width="32" height="32" alt="CampusBoard" style="border-radius:8px;" />
      <img src="assets/CampusBoard_wordmark_caps_black_cap_transparent.svg" height="44" alt="CampusBoard" style="display:block;" />
    </div>

    <div class="auth-hero">
      <h2>Kampüsündeki Her Şey Burada</h2>
      <p>Ders notu, staj ilanı, ikinci el eşya ve daha fazlasını tek platformda yönet.</p>
    </div>

    <div class="auth-features">
      <div class="auth-feature">
        <div class="auth-feature-dot"></div>
        Kendi ilanlarını oluştur ve yönet
      </div>
      <div class="auth-feature">
        <div class="auth-feature-dot"></div>
        Kategori ve fakülteye göre filtrele
      </div>
      <div class="auth-feature">
        <div class="auth-feature-dot"></div>
        Tamamen ücretsiz, reklamsız
      </div>
    </div>

    <!-- Floating decoration orbs -->
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
    <div class="auth-orb auth-orb-3"></div>
  </div>

  <!-- Sağ panel -->
  <div class="auth-panel-right">
    <div class="auth-form-wrap">
      <div class="auth-form-header">
        <h1>Tekrar hoş geldin</h1>
        <p>Devam etmek için giriş yap.</p>
      </div>

      <div id="auth-error-banner" class="auth-error-banner" style="display:none">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="#ef4444" stroke-width="1.5"/>
          <path d="M8 5v3M8 10.5v.5" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span id="auth-error-text"></span>
      </div>

      <form id="login-form" novalidate>
        <div class="auth-field">
          <label for="email">E-posta adresi</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="1" y="3" width="14" height="10" rx="2" stroke="#9ca3af" stroke-width="1.5"/>
                <path d="M1 6l7 4 7-4" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <input class="auth-input" type="email" id="email" placeholder="ornek@uni.edu" autocomplete="email" />
          </div>
          <span class="auth-field-error" id="err-email"></span>
        </div>

        <div class="auth-field">
          <label for="password">Şifre</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="3" y="7" width="10" height="8" rx="2" stroke="#9ca3af" stroke-width="1.5"/>
                <path d="M5 7V5a3 3 0 016 0v2" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <input class="auth-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" style="padding-right:2.75rem!important;" />
            <button type="button" id="toggle-password" class="auth-toggle-pw" aria-label="Şifreyi göster/gizle">
              <svg id="icon-eye" width="16" height="16" viewBox="0 0 16 16" fill="none" style="display:block">
                <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="8" cy="8" r="2" stroke="#9ca3af" stroke-width="1.5"/>
              </svg>
              <svg id="icon-eye-off" width="16" height="16" viewBox="0 0 16 16" fill="none" style="display:none">
                <path d="M2 2l12 12M6.5 6.56A2 2 0 0010.44 10.5M5.27 3.27A6.9 6.9 0 018 3c4.5 0 7 5 7 5a12.5 12.5 0 01-2.06 2.73M3.27 5.27A12.5 12.5 0 001 8s2.5 5 7 5a6.9 6.9 0 003.73-1.27" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <span class="auth-field-error" id="err-password"></span>
        </div>

        <button type="submit" class="auth-submit" id="btn-submit">Giriş Yap</button>
      </form>

      <p class="auth-switch">Hesabın yok mu? <a href="/register">Kayıt Ol</a></p>
    </div>
  </div>

  <script>
    if (localStorage.getItem('cb_token')) window.location.href = '/';

    const togglePw  = document.getElementById('toggle-password');
    const pwInput   = document.getElementById('password');
    const iconEye   = document.getElementById('icon-eye');
    const iconEyeOff = document.getElementById('icon-eye-off');
    togglePw.addEventListener('click', () => {
      const visible = pwInput.type === 'text';
      pwInput.type = visible ? 'password' : 'text';
      iconEye.style.display    = visible ? 'block' : 'none';
      iconEyeOff.style.display = visible ? 'none'  : 'block';
    });

    const form     = document.getElementById('login-form');
    const btnSub   = document.getElementById('btn-submit');
    const errBanner = document.getElementById('auth-error-banner');
    const errText   = document.getElementById('auth-error-text');

    function showError(msg) {
      errText.textContent = msg;
      errBanner.style.display = 'flex';
    }
    function clearErrors() {
      errBanner.style.display = 'none';
      ['email','password'].forEach(f => {
        document.getElementById(`err-${f}`).textContent = '';
        document.getElementById(f).classList.remove('error');
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let ok = true;

      if (!email) {
        document.getElementById('err-email').textContent = 'E-posta adresi gerekli';
        document.getElementById('email').classList.add('error');
        ok = false;
      }
      if (!password) {
        document.getElementById('err-password').textContent = 'Şifre gerekli';
        document.getElementById('password').classList.add('error');
        ok = false;
      }
      if (!ok) return;

      btnSub.disabled = true;
      btnSub.textContent = 'Giriş yapılıyor...';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          showError((data.errors || ['Giriş başarısız']).join(' '));
          return;
        }
        localStorage.setItem('cb_token', data.token);
        localStorage.setItem('cb_user',  JSON.stringify(data.user));
        window.location.href = '/';
      } catch {
        showError('Sunucuya bağlanılamadı. Lütfen tekrar deneyin.');
      } finally {
        btnSub.disabled = false;
        btnSub.textContent = 'Giriş Yap';
      }
    });
  </script>
</body>
</html>
