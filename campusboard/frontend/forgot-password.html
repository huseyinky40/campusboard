<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Şifremi Unuttum • CampusBoard</title>
  <link rel="icon" type="image/svg+xml" href="assets/campusboard_app_icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="assets/icon-192.png" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Sora:wght@600;700;800&display=swap&subset=latin-ext" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <script src="js/nav.js"></script>
</head>
<body class="auth-body auth-reset-body">
  <main class="reset-card" aria-labelledby="forgot-title">
    <div class="reset-topbar">
      <a class="reset-brand" href="/" aria-label="CampusBoard ana sayfa">
        <img src="assets/campusboard_app_icon.svg" width="34" height="34" alt="" />
        <span>Campus<span>Board</span></span>
      </a>
      <a class="reset-nav-link" href="/login">← Giriş</a>
    </div>

    <div class="reset-icon-block" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="7.5" cy="15.5" r="5.5"/>
        <path d="M21 2l-9.6 9.6"/>
        <path d="M15.5 7.5 18 10l3.5-3.5-3-3"/>
      </svg>
    </div>

    <header class="reset-header">
      <h1 id="forgot-title">Şifreni mi unuttun?</h1>
      <p>E-posta adresini gir, sana sıfırlama kodu gönderelim.</p>
    </header>

    <form id="forgot-form" class="reset-form" novalidate>
      <label class="reset-field">
        <span>E-posta adresi</span>
        <input id="email" class="reset-input" type="email" placeholder="ornek@istanbularel.edu.tr" autocomplete="email" />
      </label>
      <button id="btn-submit" class="reset-submit" type="submit">
        <span class="btn-spinner" aria-hidden="true"></span>
        <span class="btn-label">Reset kodu gönder</span>
      </button>
    </form>

    <p class="reset-footer-note">E-postayı göremezsen spam klasörünü kontrol et.</p>
  </main>

  <div id="toast" class="auth-toast" role="status" aria-live="polite"></div>

  <script>
    if (sessionStorage.getItem('cb_token')) window.location.href = '/app';

    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    window.addEventListener('pageshow', () => document.body.classList.remove('page-transitioning'));

    function navigateTo(url) {
      if (reduceMotion) { window.location.href = url; return; }
      requestAnimationFrame(() => {
        document.body.classList.add('page-transitioning');
        window.setTimeout(() => { window.location.href = url; }, 120);
      });
    }

    document.querySelectorAll('a[href]').forEach((link) => {
      link.addEventListener('click', (event) => {
        const url = new URL(link.href, window.location.href);
        if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey ||
            link.target || url.origin !== window.location.origin ||
            url.pathname === window.location.pathname) return;
        event.preventDefault();
        navigateTo(url.href);
      });
    });

    const form = document.getElementById('forgot-form');
    const emailInput = document.getElementById('email');
    const btn = document.getElementById('btn-submit');
    const btnLabel = btn.querySelector('.btn-label');
    const toast = document.getElementById('toast');

    function showToast(message, type = 'error') {
      toast.textContent = message;
      toast.className = `auth-toast show ${type}`;
      window.clearTimeout(showToast._t);
      showToast._t = window.setTimeout(() => toast.classList.remove('show'), 3200);
    }

    function setLoading(isLoading) {
      btn.disabled = isLoading;
      btn.classList.toggle('is-loading', isLoading);
      btnLabel.textContent = isLoading ? 'Gönderiliyor...' : 'Reset kodu gönder';
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = emailInput.value.trim();
      if (!email) {
        showToast('E-posta adresini gir.');
        emailInput.focus();
        return;
      }

      setLoading(true);
      try {
        const apiBase = window.CAMPUSBOARD_API_BASE || '/api';
        const res = await fetch(`${apiBase}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (!res.ok) {
          showToast((data.errors || [data.error || 'Kod gönderilemedi']).join(' '));
          return;
        }
        const params = new URLSearchParams({ email });
        navigateTo(`/reset-password?${params.toString()}`);
      } catch {
        showToast('Sunucuya bağlanılamadı. Lütfen tekrar dene.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
