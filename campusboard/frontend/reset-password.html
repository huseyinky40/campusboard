<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Şifre Sıfırla • CampusBoard</title>
  <link rel="icon" type="image/svg+xml" href="assets/campusboard_app_icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Sora:wght@600;700;800&display=swap&subset=latin-ext" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <script src="js/nav.js"></script>
</head>
<body class="auth-body auth-reset-body">
  <main class="reset-card" aria-labelledby="reset-title">
    <div class="reset-topbar">
      <a class="reset-brand" href="/" aria-label="CampusBoard ana sayfa">
        <img src="assets/campusboard_app_icon.svg" width="34" height="34" alt="" />
        <span>Campus<span>Board</span></span>
      </a>
      <a class="reset-nav-link" href="/forgot-password">← Geri</a>
    </div>

    <div class="reset-icon-block" aria-hidden="true">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
        <path d="M12 3l7 3.2v5.2c0 4.7-2.8 7.8-7 9.6-4.2-1.8-7-4.9-7-9.6V6.2L12 3z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M8.5 12.2l2.2 2.2 4.8-5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <section id="step-code" class="reset-step active" aria-labelledby="reset-title">
      <header class="reset-header">
        <h1 id="reset-title">Reset kodunu gir</h1>
        <p><span id="masked-email"></span></p>
        <small class="reset-warning">⚠ Kod büyük/küçük harfe duyarlıdır</small>
      </header>

      <form id="code-form" class="reset-form" novalidate>
        <div class="code-grid" aria-label="Reset kodu">
          <input class="code-box" maxlength="1" autocomplete="one-time-code" inputmode="text" aria-label="Kod karakteri 1" />
          <input class="code-box" maxlength="1" inputmode="text" aria-label="Kod karakteri 2" />
          <input class="code-box" maxlength="1" inputmode="text" aria-label="Kod karakteri 3" />
          <input class="code-box" maxlength="1" inputmode="text" aria-label="Kod karakteri 4" />
          <input class="code-box" maxlength="1" inputmode="text" aria-label="Kod karakteri 5" />
        </div>
        <button id="btn-code" class="reset-submit reset-submit-rose" type="submit" disabled>
          <span class="btn-spinner" aria-hidden="true"></span>
          <span class="btn-label">Kodu doğrula</span>
        </button>
      </form>
    </section>

    <section id="step-password" class="reset-step" aria-labelledby="password-title">
      <header class="reset-header">
        <h1 id="password-title">Yeni şifre belirle</h1>
        <p>Güçlü bir şifre seç.</p>
      </header>

      <form id="password-form" class="reset-form" novalidate>
        <label class="reset-field">
          <span>Yeni şifre</span>
          <div class="reset-password-wrap">
            <input id="password" class="reset-input" type="password" placeholder="En az 8 karakter" autocomplete="new-password" />
            <button id="toggle-password" class="reset-eye" type="button" aria-label="Şifreyi göster/gizle">
              <svg class="eye-on" width="18" height="18" viewBox="0 0 16 16" fill="none" style="display:block">
                <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/>
              </svg>
              <svg class="eye-off" width="18" height="18" viewBox="0 0 16 16" fill="none" style="display:none">
                <path d="M14 2L2 14M9.4 6.6A2 2 0 016.6 9.4M10.73 3.27A6.9 6.9 0 018 3C3.5 3 1 8 1 8a12.5 12.5 0 002.06 2.73M12.73 5.27A12.5 12.5 0 0115 8s-2.5 5-7 5a6.9 6.9 0 01-3.73-1.27" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </label>

        <div id="strength" class="reset-strength" hidden>
          <div class="strength-bars" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </div>
          <div class="strength-checks">
            <div data-rule="len">En az 8 karakter</div>
            <div data-rule="upper">Büyük harf</div>
            <div data-rule="lower">Küçük harf</div>
            <div data-rule="num">Rakam</div>
          </div>
        </div>

        <button id="btn-password" class="reset-submit reset-submit-rose" type="submit" disabled>
          <span class="btn-spinner" aria-hidden="true"></span>
          <span class="btn-label">Şifreyi güncelle</span>
        </button>
      </form>
    </section>

    <p class="reset-footer-note">
      Sorun mu yaşıyorsun? <a href="/forgot-password">Yeni kod iste</a>
    </p>
  </main>

  <div id="toast" class="auth-toast" role="status" aria-live="polite"></div>

  <script>
    if (sessionStorage.getItem('cb_token')) window.location.href = '/app';

    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    window.addEventListener('pageshow', () => document.body.classList.remove('page-transitioning'));

    function navigateTo(url) {
      if (reduceMotion) { window.location.href = url; return; }
      requestAnimationFrame(() => {
        document.body.classList.add('page-transitioning');
        window.setTimeout(() => { window.location.href = url; }, 120);
      });
    }

    document.querySelectorAll('a[href]').forEach((link) => {
      link.addEventListener('click', (event) => {
        const url = new URL(link.href, window.location.href);
        if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey ||
            link.target || url.origin !== window.location.origin ||
            url.pathname === window.location.pathname) return;
        event.preventDefault();
        navigateTo(url.href);
      });
    });

    function goToStep2() {
      const stepCode = document.getElementById('step-code');
      const stepPassword = document.getElementById('step-password');
      if (reduceMotion) {
        stepCode.classList.remove('active');
        stepPassword.classList.add('active');
        document.getElementById('password').focus();
        return;
      }
      stepCode.classList.add('reset-step-exit');
      window.setTimeout(() => {
        stepCode.classList.remove('active', 'reset-step-exit');
        stepPassword.classList.add('active');
        document.getElementById('password').focus();
      }, 190);
    }

    const params = new URLSearchParams(window.location.search);
    const email = params.get('email') || '';
    const codeBoxes = [...document.querySelectorAll('.code-box')];
    const btnCode = document.getElementById('btn-code');
    const btnPassword = document.getElementById('btn-password');
    const toast = document.getElementById('toast');
    let verifiedCode = '';

    if (!email) window.location.href = '/forgot-password';
    document.getElementById('masked-email').textContent = maskEmail(email);

    function showToast(message, type = 'error') {
      toast.textContent = message;
      toast.className = `auth-toast show ${type}`;
      window.clearTimeout(showToast._t);
      showToast._t = window.setTimeout(() => toast.classList.remove('show'), 3200);
    }

    function setLoading(button, label, isLoading, loadingText, defaultText) {
      button.disabled = isLoading || button.dataset.blocked === 'true';
      button.classList.toggle('is-loading', isLoading);
      label.textContent = isLoading ? loadingText : defaultText;
    }

    function maskEmail(value) {
      const [local, domain] = String(value).split('@');
      if (!local || !domain) return value;
      const visible = local.slice(0, Math.min(2, local.length));
      return `${visible}${'*'.repeat(Math.max(4, local.length - visible.length))}@${domain}`;
    }

    function currentCode() {
      return codeBoxes.map(input => input.value).join('');
    }

    function updateCodeState() {
      codeBoxes.forEach(input => input.classList.toggle('filled', !!input.value));
      btnCode.disabled = currentCode().length !== 5;
    }

    function clearCode() {
      codeBoxes.forEach(input => {
        input.value = '';
        input.classList.remove('filled');
      });
      updateCodeState();
      codeBoxes[0].focus();
    }

    codeBoxes.forEach((input, index) => {
      input.addEventListener('input', () => {
        input.value = input.value.slice(-1);
        if (input.value && index < codeBoxes.length - 1) codeBoxes[index + 1].focus();
        updateCodeState();
      });
      input.addEventListener('keydown', (event) => {
        if (event.key === 'Backspace' && !input.value && index > 0) {
          codeBoxes[index - 1].focus();
        }
      });
      input.addEventListener('paste', (event) => {
        event.preventDefault();
        const pasted = event.clipboardData.getData('text').trim();
        if (pasted.length !== 5) return;
        [...pasted].forEach((char, i) => {
          if (codeBoxes[i]) codeBoxes[i].value = char;
        });
        codeBoxes[Math.min(4, pasted.length - 1)].focus();
        updateCodeState();
      });
    });

    document.getElementById('code-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const code = currentCode();
      if (code.length !== 5) return;
      const label = btnCode.querySelector('.btn-label');
      setLoading(btnCode, label, true, 'Doğrulanıyor...', 'Kodu doğrula');
      try {
        const apiBase = window.CAMPUSBOARD_API_BASE || '/api';
        const res = await fetch(`${apiBase}/auth/verify-reset-code`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code }),
        });
        const data = await res.json();
        if (!res.ok) {
          clearCode();
          showToast((data.errors || [data.error || 'Kod doğrulanamadı']).join(' '));
          return;
        }
        verifiedCode = code;
        goToStep2();
      } catch {
        clearCode();
        showToast('Sunucuya bağlanılamadı. Lütfen tekrar dene.');
      } finally {
        setLoading(btnCode, label, false, 'Doğrulanıyor...', 'Kodu doğrula');
        updateCodeState();
      }
    });

    function blockPasswordClipboard(...ids) {
      ids.forEach((id) => {
        const input = document.getElementById(id);
        if (!input) return;
        ['copy', 'cut', 'paste', 'drop'].forEach((eventName) => {
          input.addEventListener(eventName, (event) => event.preventDefault());
        });
        input.addEventListener('contextmenu', (event) => event.preventDefault());
      });
    }
    blockPasswordClipboard('password');

    const pwInput = document.getElementById('password');
    const strength = document.getElementById('strength');
    const bars = [...document.querySelectorAll('.strength-bars span')];
    const checks = [...document.querySelectorAll('.strength-checks div')];
    const rules = {
      len: value => value.length >= 8,
      upper: value => /[A-Z]/.test(value),
      lower: value => /[a-z]/.test(value),
      num: value => /[0-9]/.test(value),
    };

    function updateStrength() {
      const value = pwInput.value;
      strength.hidden = !value;
      const score = Object.entries(rules).filter(([, check]) => check(value)).length;
      strength.dataset.score = String(score);
      bars.forEach((bar, index) => bar.classList.toggle('filled', index < score));
      checks.forEach((item) => {
        const passed = rules[item.dataset.rule](value);
        item.classList.toggle('passed', passed);
      });
      btnPassword.disabled = value.length < 8;
    }

    pwInput.addEventListener('input', updateStrength);

    document.getElementById('toggle-password').addEventListener('click', () => {
      const visible = pwInput.type === 'text';
      pwInput.type = visible ? 'password' : 'text';
      document.querySelector('.eye-on').style.display = visible ? 'block' : 'none';
      document.querySelector('.eye-off').style.display = visible ? 'none' : 'block';
    });

    document.getElementById('password-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      if (pwInput.value.length < 8 || !verifiedCode) return;
      const label = btnPassword.querySelector('.btn-label');
      setLoading(btnPassword, label, true, 'Güncelleniyor...', 'Şifreyi güncelle');
      try {
        const apiBase = window.CAMPUSBOARD_API_BASE || '/api';
        const res = await fetch(`${apiBase}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code: verifiedCode, password: pwInput.value }),
        });
        const data = await res.json();
        if (!res.ok) {
          showToast((data.errors || [data.error || 'Şifre güncellenemedi']).join(' '));
          return;
        }
        showToast('Şifren güncellendi. Giriş ekranına yönlendiriliyorsun.', 'success');
        sessionStorage.setItem('cb_register_success', 'Şifren güncellendi. Yeni şifrenle giriş yapabilirsin.');
        sessionStorage.setItem('cb_register_email', email);
        window.setTimeout(() => navigateTo('/login'), 900);
      } catch {
        showToast('Sunucuya bağlanılamadı. Lütfen tekrar dene.');
      } finally {
        setLoading(btnPassword, label, false, 'Güncelleniyor...', 'Şifreyi güncelle');
        updateStrength();
      }
    });

    updateCodeState();
    codeBoxes[0].focus();
  </script>
</body>
</html>
